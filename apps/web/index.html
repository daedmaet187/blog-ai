<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>stuff187.com · Blog</title>
    <style>
      :root { --bg:#0b1020; --card:#141b31; --text:#e9eefc; --muted:#9fb0da; --line:#2b3960; --acc:#8aa6ff; }
      * { box-sizing:border-box; }
      body { margin:0; background: radial-gradient(1200px 700px at 0% -10%, #1b2550 0%, var(--bg) 50%); color:var(--text); font-family:Inter,system-ui,Arial,sans-serif; }
      .wrap { max-width: 880px; margin: 28px auto; padding: 0 16px; }
      .top { display:flex; justify-content:space-between; align-items:end; }
      .muted { color: var(--muted); }
      .post { border:1px solid var(--line); border-radius:14px; background:var(--card); padding:14px; margin:12px 0; }
      h1 { margin:0; font-size:32px; }
      h2 { margin:0 0 6px; }
      a { color: var(--acc); text-decoration:none; }
      a:hover { text-decoration:underline; }
      .error { color:#ff6b6b; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="top">
        <h1>Blog</h1>
        <div class="muted">Powered by Mission Control</div>
      </div>
      <p id="status" class="muted">Loading posts...</p>
      <div id="list"></div>
    </div>
    <script>
      const API = 'https://api.stuff187.com';
      const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\"/g,'&quot;').replace(/'/g,'&#039;');
      const fmt = d => { try { return new Date(d).toLocaleString(); } catch { return d || ''; } };
      const stripMd = s => String(s || '')
        .replace(/```[\s\S]*?```/g, ' ')
        .replace(/!\[[^\]]*\]\([^)]*\)/g, ' ')
        .replace(/\[([^\]]+)\]\([^)]*\)/g, '$1')
        .replace(/[#>*_`-]/g, ' ')
        .replace(/\s+/g, ' ')
        .trim();

      async function load(){
        const status=document.getElementById('status'); const list=document.getElementById('list');
        try {
          const res = await fetch(`${API}/posts?skip=0&limit=20`);
          if(!res.ok) throw new Error(`HTTP ${res.status}`);
          const posts = await res.json();
          status.textContent = `${posts.length} published post(s)`;
          list.innerHTML = posts.map(p => `
            <article class="post">
              <h2><a href="./post.html?slug=${encodeURIComponent(p.slug)}">${esc(p.title)}</a></h2>
              <div class="muted">Updated: ${esc(fmt(p.updated_at || p.created_at))}</div>
              <p>${esc(stripMd(p.content).slice(0,220))}${stripMd(p.content).length>220?'...':''}</p>
              <a href="./post.html?slug=${encodeURIComponent(p.slug)}">Read more →</a>
            </article>
          `).join('');
        } catch(e){
          status.innerHTML = `<span class="error">Failed to load posts: ${esc(e.message)}</span>`;
        }
      }
      load();
    </script>
  </body>
</html>
