<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Approval Dashboard · AI Landing Platform</title>
    <style>
      :root { --bg:#0b1020; --panel:#131a2e; --panel2:#1a2340; --text:#e9eefc; --muted:#9fb0da; --ok:#33d17a; --err:#ff6b6b; --acc:#7c9cff; --line:#2a3760; }
      *{box-sizing:border-box}
      body{margin:0;background:radial-gradient(1200px 800px at 0% -10%, #1b2550 0%, var(--bg) 50%);color:var(--text);font-family:Inter,system-ui,Arial,sans-serif}
      .wrap{max-width:1100px;margin:28px auto;padding:0 16px}
      .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
      .card{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:0 10px 30px rgba(0,0,0,.25)}
      h1,h3{margin:0 0 10px} h1{font-size:30px} h3{font-size:20px}
      label{font-size:12px;color:var(--muted);display:block;margin-top:8px}
      input,select,button{width:100%;border-radius:10px;border:1px solid var(--line);background:#0f1730;color:var(--text);padding:10px 12px;margin-top:6px}
      .inline{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
      .inline button{width:auto;cursor:pointer}
      .primary{background:var(--acc);color:#0b1020;border:none;font-weight:700}
      .ghost{background:transparent}
      .danger{background:#41202a;border-color:#6b3143}
      table{width:100%;border-collapse:collapse;margin-top:10px;font-size:14px}
      th,td{padding:10px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}
      th{color:var(--muted);font-weight:600}
      .badge{padding:2px 8px;border-radius:999px;font-size:12px;display:inline-block;background:#163726;color:#8ff0b3}
      .ok{color:var(--ok)} .err{color:var(--err)} .muted{color:var(--muted);font-size:13px}
      .toast{position:fixed;right:16px;bottom:16px;min-width:250px;padding:12px 14px;border-radius:10px;background:#101932;border:1px solid var(--line);display:none}
      .toast.show{display:block}
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="top">
        <h1>Admin Approval Dashboard</h1>
        <div class="muted">API: <code>https://api.stuff187.com</code></div>
      </div>

      <section class="card">
        <h3>Auth</h3>
        <label>Email</label><input id="email" value="admin@stuff187.com" />
        <label>Password</label><input id="password" type="password" placeholder="••••••••" />
        <div class="inline" style="margin-top:10px">
          <button id="loginBtn" class="primary">Login</button>
          <button id="refreshBtn" class="ghost">Refresh Queue</button>
          <button id="logoutBtn" class="ghost">Logout</button>
        </div>
        <p id="authMsg" class="muted"></p>
      </section>

      <section class="card">
        <div class="inline" style="justify-content:space-between">
          <h3 style="margin:0">Approval Queue</h3>
          <select id="queueType" style="max-width:240px">
            <option value="all">All approvals</option>
            <option value="design">Design approvals</option>
            <option value="deploy">Deploy approvals</option>
          </select>
        </div>
        <table>
          <thead><tr><th>Project</th><th>Title</th><th>State</th><th>Updated</th><th>Actions</th></tr></thead>
          <tbody id="queueRows"><tr><td colspan="5" class="muted">Login to load queue.</td></tr></tbody>
        </table>
      </section>
    </div>

    <div id="toast" class="toast"></div>

    <script>
      const API = 'https://api.stuff187.com';
      const $ = id => document.getElementById(id);
      const token = () => localStorage.getItem('admin_token') || '';
      const setToken = v => localStorage.setItem('admin_token', v);
      const clearToken = () => localStorage.removeItem('admin_token');
      const dt = d => { try { return new Date(d).toLocaleString(); } catch { return d || '' }};
      const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\"/g,'&quot;').replace(/'/g,'&#039;');

      function toast(text, ok=true){ const t=$('toast'); t.textContent=text; t.style.borderColor=ok?'#2f6f4c':'#7a3047'; t.className='toast show'; setTimeout(()=>t.className='toast', 2200); }
      function setMsg(id,text,ok=true){ const el=$(id); el.textContent=text; el.className=ok?'ok':'err'; }
      function fmtErr(d,s){ return typeof d?.detail==='string' ? d.detail : `HTTP ${s}`; }

      async function api(path, options={}) {
        const headers = { ...(options.headers || {}) };
        if (token()) headers.Authorization = `Bearer ${token()}`;
        const res = await fetch(`${API}${path}`, { ...options, headers });
        let data = null; try { data = await res.json(); } catch {}
        if (!res.ok) throw new Error(fmtErr(data, res.status));
        return data;
      }

      async function refreshQueue(){
        const rows = $('queueRows');
        rows.innerHTML = '<tr><td colspan="5" class="muted">Loading…</td></tr>';
        if (!token()) { rows.innerHTML = '<tr><td colspan="5" class="muted">Login to load queue.</td></tr>'; return; }
        try {
          const type = encodeURIComponent($('queueType').value || 'all');
          const data = await api(`/admin/projects/approval-queue?type=${type}`);
          if (!data.length) { rows.innerHTML = '<tr><td colspan="5" class="muted">Queue is empty.</td></tr>'; return; }
          rows.innerHTML = data.map(item => {
            const designActions = item.state === 'awaiting_admin_design_approval'
              ? `<button class="primary" data-action="design-approve" data-id="${item.project_id}">Approve Design</button>
                 <button class="danger" data-action="design-reject" data-id="${item.project_id}">Reject Design</button>`
              : '';
            const deployActions = item.state === 'awaiting_admin_deploy_approval'
              ? `<button class="primary" data-action="deploy-approve" data-id="${item.project_id}">Approve Deploy</button>
                 <button class="danger" data-action="deploy-reject" data-id="${item.project_id}">Reject Deploy</button>`
              : '';
            return `
              <tr>
                <td>#${item.project_id}</td>
                <td>${esc(item.title)}</td>
                <td><span class="badge">${esc(item.state)}</span></td>
                <td>${esc(dt(item.updated_at))}</td>
                <td><div class="inline">${designActions}${deployActions}</div></td>
              </tr>
            `;
          }).join('');
        } catch (e) {
          rows.innerHTML = `<tr><td colspan="5" class="err">${esc(e.message)}</td></tr>`;
        }
      }

      async function doAction(projectId, action) {
        const map = {
          'design-approve': `/admin/projects/${projectId}/design/approve`,
          'design-reject': `/admin/projects/${projectId}/design/reject`,
          'deploy-approve': `/admin/projects/${projectId}/deploy/approve`,
          'deploy-reject': `/admin/projects/${projectId}/deploy/reject`,
        };
        const endpoint = map[action];
        if (!endpoint) return;
        try {
          await api(endpoint, { method: 'POST' });
          toast(`Project #${projectId}: ${action}`);
          refreshQueue();
        } catch (e) {
          toast(e.message, false);
        }
      }

      $('loginBtn').onclick = async () => {
        try {
          const body = new URLSearchParams({ username: $('email').value.trim(), password: $('password').value });
          const data = await api('/auth/login', { method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body });
          setToken(data.access_token);
          setMsg('authMsg','Login success.');
          refreshQueue();
        } catch (e) { setMsg('authMsg', `Login failed: ${e.message}`, false); }
      };
      $('logoutBtn').onclick = () => { clearToken(); setMsg('authMsg', 'Logged out.'); refreshQueue(); };
      $('refreshBtn').onclick = refreshQueue;
      $('queueType').onchange = refreshQueue;
      $('queueRows').addEventListener('click', (e) => {
        const btn = e.target.closest('button[data-action]');
        if (!btn) return;
        doAction(Number(btn.dataset.id), btn.dataset.action);
      });
      refreshQueue();
    </script>
  </body>
</html>
