<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard</title>
    <style>
      body { font-family: Arial, sans-serif; max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
      input, textarea, button { width: 100%; padding: 0.6rem; margin: 0.3rem 0; }
      textarea { min-height: 140px; }
      .row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
      .card { border: 1px solid #ddd; border-radius: 10px; padding: 1rem; margin-bottom: 1rem; }
      .ok { color: #0a7f2e; }
      .err { color: #b00020; }
      .muted { color: #666; font-size: 0.9rem; }
      .inline { display: flex; gap: .5rem; }
      .inline button { width: auto; }
      code { background: #f5f5f5; padding: 0.1rem 0.3rem; border-radius: 4px; }
    </style>
  </head>
  <body>
    <h1>Admin Dashboard</h1>
    <p class="muted">API: <code>https://api.stuff187.com</code></p>

    <section class="card">
      <h3>Login</h3>
      <input id="email" placeholder="admin@stuff187.com" value="admin@stuff187.com" />
      <input id="password" type="password" placeholder="Password" />
      <div class="inline">
        <button id="loginBtn">Login</button>
        <button id="whoBtn">Check Token</button>
      </div>
      <div id="authMsg" class="muted"></div>
    </section>

    <section class="card">
      <h3>Create Draft Post</h3>
      <input id="title" placeholder="Post title" />
      <input id="slug" placeholder="post-slug" />
      <textarea id="content" placeholder="Post content"></textarea>
      <button id="createBtn">Create Draft</button>
      <div id="createMsg" class="muted"></div>
    </section>

    <section class="card">
      <h3>Publish Post</h3>
      <input id="postId" type="number" placeholder="Post ID (e.g. 1)" />
      <button id="publishBtn">Publish</button>
      <div id="publishMsg" class="muted"></div>
    </section>

    <script>
      const API = "https://api.stuff187.com";

      function setMsg(el, text, ok = true) {
        el.textContent = text;
        el.className = ok ? 'ok' : 'err';
      }

      function getToken() {
        return localStorage.getItem('admin_token') || '';
      }

      function setToken(t) {
        localStorage.setItem('admin_token', t);
      }

      document.getElementById('loginBtn').onclick = async () => {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const msg = document.getElementById('authMsg');

        try {
          const body = new URLSearchParams({ username: email, password });
          const res = await fetch(`${API}/auth/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body,
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.detail || `HTTP ${res.status}`);
          setToken(data.access_token);
          setMsg(msg, 'Login success. Token saved locally.');
        } catch (e) {
          setMsg(msg, `Login failed: ${e.message}`, false);
        }
      };

      document.getElementById('whoBtn').onclick = () => {
        const msg = document.getElementById('authMsg');
        const token = getToken();
        if (!token) return setMsg(msg, 'No token stored yet.', false);
        setMsg(msg, `Token loaded (${token.slice(0, 24)}...)`);
      };

      document.getElementById('createBtn').onclick = async () => {
        const token = getToken();
        const msg = document.getElementById('createMsg');
        if (!token) return setMsg(msg, 'Please login first.', false);

        const payload = {
          title: document.getElementById('title').value,
          slug: document.getElementById('slug').value,
          content: document.getElementById('content').value,
        };

        try {
          const res = await fetch(`${API}/posts`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${token}`,
            },
            body: JSON.stringify(payload),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.detail || `HTTP ${res.status}`);
          setMsg(msg, `Draft created. Post ID: ${data.id}`);
          document.getElementById('postId').value = data.id;
        } catch (e) {
          setMsg(msg, `Create failed: ${e.message}`, false);
        }
      };

      document.getElementById('publishBtn').onclick = async () => {
        const token = getToken();
        const msg = document.getElementById('publishMsg');
        if (!token) return setMsg(msg, 'Please login first.', false);

        const id = document.getElementById('postId').value;
        if (!id) return setMsg(msg, 'Enter post ID first.', false);

        try {
          const res = await fetch(`${API}/posts/${id}`, {
            method: 'PATCH',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${token}`,
            },
            body: JSON.stringify({ status: 'published' }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.detail || `HTTP ${res.status}`);
          setMsg(msg, `Post published: ${data.slug}`);
        } catch (e) {
          setMsg(msg, `Publish failed: ${e.message}`, false);
        }
      };
    </script>
  </body>
</html>
