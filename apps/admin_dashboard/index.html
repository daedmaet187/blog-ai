<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard · Blog Mission Control</title>
    <style>
      :root { --bg:#0b1020; --panel:#131a2e; --panel2:#1a2340; --text:#e9eefc; --muted:#9fb0da; --ok:#33d17a; --err:#ff6b6b; --acc:#7c9cff; --line:#2a3760; --warn:#ffb454; }
      *{box-sizing:border-box}
      body{margin:0;background:radial-gradient(1200px 800px at 0% -10%, #1b2550 0%, var(--bg) 50%);color:var(--text);font-family:Inter,system-ui,Arial,sans-serif}
      .wrap{max-width:1100px;margin:28px auto;padding:0 16px}
      .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
      .card{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:0 10px 30px rgba(0,0,0,.25)}
      h1,h3{margin:0 0 10px} h1{font-size:30px} h3{font-size:20px}
      label{font-size:12px;color:var(--muted);display:block;margin-top:8px}
      input,textarea,select,button{width:100%;border-radius:10px;border:1px solid var(--line);background:#0f1730;color:var(--text);padding:10px 12px;margin-top:6px}
      textarea{min-height:170px;resize:vertical}
      .editor-tools{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
      .editor-tools input{flex:1;min-width:220px;margin-top:0}
      .editor-tools button{width:auto;margin-top:0}
      .toolbar{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
      .toolbar button{width:auto;margin-top:0;padding:7px 10px;font-size:13px}
      .preview{margin-top:10px;padding:12px;border:1px solid var(--line);border-radius:10px;background:#0f1730;line-height:1.65}
      .preview img{max-width:100%;border-radius:8px}
      .preview code{background:#1f2b52;padding:2px 6px;border-radius:6px}
      .preview pre{overflow:auto;background:#0b1228;padding:10px;border-radius:8px}
      .preview blockquote{border-left:3px solid var(--acc);margin:8px 0;padding-left:10px;color:var(--muted)}
      .inline{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
      .inline button{width:auto;cursor:pointer}
      .primary{background:var(--acc);color:#0b1020;border:none;font-weight:700}
      .ghost{background:transparent}
      .danger{background:#41202a;border-color:#6b3143}
      .ok{color:var(--ok)} .err{color:var(--err)} .muted{color:var(--muted);font-size:13px}
      .grid{display:grid;grid-template-columns:1fr;gap:14px} @media (min-width:980px){.grid{grid-template-columns:1fr 1fr}}
      table{width:100%;border-collapse:collapse;margin-top:10px;font-size:14px}
      th,td{padding:10px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}
      th{color:var(--muted);font-weight:600}
      .badge{padding:2px 8px;border-radius:999px;font-size:12px;display:inline-block}
      .b-pub{background:#163726;color:#8ff0b3}.b-draft{background:#423315;color:#ffcb6b}
      .toast{position:fixed;right:16px;bottom:16px;min-width:250px;padding:12px 14px;border-radius:10px;background:#101932;border:1px solid var(--line);display:none}
      .toast.show{display:block}
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="top">
        <h1>Admin Dashboard</h1>
        <div class="muted">API: <code>https://api.stuff187.com</code></div>
      </div>

      <div class="grid">
        <section class="card">
          <h3>Auth</h3>
          <label>Email</label><input id="email" value="admin@stuff187.com" />
          <label>Password</label><input id="password" type="password" placeholder="••••••••" />
          <div class="inline" style="margin-top:10px">
            <button id="loginBtn" class="primary">Login</button>
            <button id="whoBtn" class="ghost">Who am I</button>
            <button id="logoutBtn" class="ghost">Logout</button>
          </div>
          <p id="authMsg" class="muted"></p>
        </section>

        <section class="card">
          <h3>Post Editor</h3>
          <p class="muted" id="editorMode">Mode: Create new draft</p>
          <label>Title</label><input id="title" placeholder="My great post" />
          <label>Slug (kebab-case)</label><input id="slug" placeholder="my-great-post" />
          <label>Content (Markdown supported)</label><textarea id="content" placeholder="Write your post..."></textarea>
          <div class="toolbar">
            <button id="tbH1" class="ghost">H1</button>
            <button id="tbH2" class="ghost">H2</button>
            <button id="tbBold" class="ghost">Bold</button>
            <button id="tbItalic" class="ghost">Italic</button>
            <button id="tbLink" class="ghost">Link</button>
            <button id="tbCode" class="ghost">Inline Code</button>
            <button id="tbCodeBlock" class="ghost">Code Block</button>
            <button id="tbQuote" class="ghost">Quote</button>
            <button id="tbList" class="ghost">List</button>
          </div>
          <div class="editor-tools">
            <input id="imageUrl" placeholder="https://... image URL" />
            <button id="insertImageBtn" class="ghost">Insert Image</button>
            <button id="previewBtn" class="ghost">Toggle Preview</button>
          </div>
          <div id="preview" class="preview" style="display:none"></div>
          <div class="inline" style="margin-top:10px">
            <button id="saveBtn" class="primary">Create Draft</button>
            <button id="publishBtn" class="ghost">Save & Publish</button>
            <button id="resetBtn" class="ghost">Reset Form</button>
          </div>
          <p id="editorMsg" class="muted"></p>
        </section>
      </div>

      <section class="card">
        <div class="inline" style="justify-content:space-between;margin-bottom:8px">
          <h3 style="margin:0">Manage Posts</h3>
          <div class="inline">
            <input id="q" placeholder="Search title or slug" style="width:220px" />
            <select id="statusFilter" style="width:140px">
              <option value="">All</option>
              <option value="draft">Draft</option>
              <option value="published">Published</option>
            </select>
            <button id="refreshBtn" class="ghost">Refresh</button>
          </div>
        </div>

        <div style="overflow:auto">
          <table>
            <thead><tr><th>ID</th><th>Title</th><th>Slug</th><th>Status</th><th>Updated</th><th>Actions</th></tr></thead>
            <tbody id="rows"><tr><td colspan="6" class="muted">Loading…</td></tr></tbody>
          </table>
        </div>
      </section>
    </div>

    <div id="toast" class="toast"></div>

    <script>
      const API = 'https://api.stuff187.com';
      let editingId = null;

      const $ = id => document.getElementById(id);
      const token = () => localStorage.getItem('admin_token') || '';
      const setToken = v => localStorage.setItem('admin_token', v);
      const clearToken = () => localStorage.removeItem('admin_token');
      const slugify = (s='') => s.toLowerCase().trim().replace(/[^a-z0-9\s-]/g,'').replace(/\s+/g,'-').replace(/-+/g,'-');
      const fmtErr = (d,s)=> typeof d?.detail==='string' ? d.detail : Array.isArray(d?.detail) ? d.detail.map(x=>x.msg).join('; ') : `HTTP ${s}`;
      const dt = d => { try { return new Date(d).toLocaleString(); } catch { return d || '' }};
      const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\"/g,'&quot;').replace(/'/g,'&#039;');

      function renderMarkdown(md='') {
        let html = esc(md);
        html = html.replace(/^###\s+(.*)$/gm, '<h3>$1</h3>')
                   .replace(/^##\s+(.*)$/gm, '<h2>$1</h2>')
                   .replace(/^#\s+(.*)$/gm, '<h1>$1</h1>');
        html = html.replace(/^>\s+(.*)$/gm, '<blockquote>$1</blockquote>');
        html = html.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
        html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
        html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
        html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
        html = html.replace(/!\[([^\]]*)\]\((https?:[^\s)]+)\)/g, '<img alt="$1" src="$2" />');
        html = html.replace(/\[([^\]]+)\]\((https?:[^\s)]+)\)/g, '<a href="$2" target="_blank" rel="noreferrer">$1</a>');
        html = html.replace(/\n\n/g, '</p><p>');
        return `<p>${html}</p>`;
      }

      function refreshPreview() {
        $('preview').innerHTML = renderMarkdown($('content').value || '_Nothing to preview yet_');
      }

      function wrapSelection(before, after = '') {
        const el = $('content');
        const start = el.selectionStart ?? el.value.length;
        const end = el.selectionEnd ?? el.value.length;
        const selected = el.value.slice(start, end) || 'text';
        el.value = el.value.slice(0, start) + before + selected + after + el.value.slice(end);
        el.focus();
        el.selectionStart = start + before.length;
        el.selectionEnd = start + before.length + selected.length;
        if ($('preview').style.display !== 'none') refreshPreview();
      }

      function linePrefix(prefix) {
        const el = $('content');
        const start = el.selectionStart ?? el.value.length;
        const end = el.selectionEnd ?? el.value.length;
        const block = el.value.slice(start, end) || 'text';
        const updated = block.split('\n').map(l => l ? prefix + l : l).join('\n');
        el.value = el.value.slice(0, start) + updated + el.value.slice(end);
        el.focus();
        if ($('preview').style.display !== 'none') refreshPreview();
      }

      function toast(text, ok=true){ const t=$('toast'); t.textContent=text; t.style.borderColor=ok?'#2f6f4c':'#7a3047'; t.className='toast show'; setTimeout(()=>t.className='toast', 2200); }
      function setMsg(id,text,ok=true){ const el=$(id); el.textContent=text; el.className=ok?'ok':'err'; }

      async function api(path, options={}) {
        const headers = { ...(options.headers || {}) };
        if (token()) headers.Authorization = `Bearer ${token()}`;
        const res = await fetch(`${API}${path}`, { ...options, headers });
        let data = null; try { data = await res.json(); } catch {}
        if (!res.ok) throw new Error(fmtErr(data, res.status));
        return data;
      }

      function resetForm(){
        editingId = null;
        $('editorMode').textContent = 'Mode: Create new draft';
        $('saveBtn').textContent = 'Create Draft';
        $('title').value=''; $('slug').value=''; $('content').value=''; $('imageUrl').value='';
        $('preview').style.display = 'none';
        $('preview').innerHTML = '';
        setMsg('editorMsg','');
      }

      $('title').addEventListener('input', e => { if (!$('slug').value.trim()) $('slug').value = slugify(e.target.value); });
      $('content').addEventListener('input', () => { if ($('preview').style.display !== 'none') refreshPreview(); });
      $('tbH1').onclick = () => linePrefix('# ');
      $('tbH2').onclick = () => linePrefix('## ');
      $('tbBold').onclick = () => wrapSelection('**', '**');
      $('tbItalic').onclick = () => wrapSelection('*', '*');
      $('tbCode').onclick = () => wrapSelection('`', '`');
      $('tbCodeBlock').onclick = () => wrapSelection('\n```\n', '\n```\n');
      $('tbQuote').onclick = () => linePrefix('> ');
      $('tbList').onclick = () => linePrefix('- ');
      $('tbLink').onclick = () => {
        const url = prompt('Enter URL (https://...)', 'https://');
        if (!url) return;
        if (!/^https?:\/\//.test(url)) return toast('Use full URL (http/https)', false);
        const el = $('content');
        const start = el.selectionStart ?? el.value.length;
        const end = el.selectionEnd ?? el.value.length;
        const selected = el.value.slice(start, end) || 'link text';
        const md = `[${selected}](${url})`;
        el.value = el.value.slice(0, start) + md + el.value.slice(end);
        el.focus();
        if ($('preview').style.display !== 'none') refreshPreview();
      };
      $('previewBtn').onclick = () => {
        const p = $('preview');
        p.style.display = p.style.display === 'none' ? 'block' : 'none';
        if (p.style.display === 'block') refreshPreview();
      };
      $('insertImageBtn').onclick = () => {
        const url = $('imageUrl').value.trim();
        if (!/^https?:\/\//.test(url)) return toast('Use full image URL (http/https)', false);
        const md = `\n\n![image](${url})\n`;
        $('content').value += md;
        $('imageUrl').value = '';
        if ($('preview').style.display !== 'none') refreshPreview();
      };

      $('loginBtn').onclick = async () => {
        try {
          const body = new URLSearchParams({ username: $('email').value.trim(), password: $('password').value });
          const data = await api('/auth/login', { method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body });
          setToken(data.access_token);
          setMsg('authMsg','Login success.');
          toast('Logged in');
          refreshPosts();
        } catch (e) { setMsg('authMsg', `Login failed: ${e.message}`, false); }
      };

      $('whoBtn').onclick = async () => {
        if (!token()) return setMsg('authMsg','No token stored.',false);
        try { const me = await api('/auth/me'); setMsg('authMsg', `Logged in as ${me.email} (${me.role})`); }
        catch (e) { setMsg('authMsg',`Token check failed: ${e.message}`,false); }
      };

      $('logoutBtn').onclick = () => { clearToken(); setMsg('authMsg','Logged out.'); toast('Logged out'); };

      $('saveBtn').onclick = async () => {
        if (!token()) return setMsg('editorMsg','Please login first.',false);
        const payload = { title: $('title').value.trim(), slug: $('slug').value.trim(), content: $('content').value };
        $('saveBtn').disabled = true;
        try {
          if (editingId) {
            await api(`/posts/${editingId}`, { method:'PATCH', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
            setMsg('editorMsg', `Post #${editingId} updated.`);
            toast('Post updated');
          } else {
            const created = await api('/posts', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
            setMsg('editorMsg', `Draft created #${created.id}`);
            toast('Draft created');
          }
          resetForm();
          refreshPosts();
        } catch (e) {
          setMsg('editorMsg', `Save failed: ${e.message}`, false);
        } finally { $('saveBtn').disabled = false; }
      };

      $('publishBtn').onclick = async () => {
        if (!token()) return setMsg('editorMsg','Please login first.',false);
        try {
          if (editingId) {
            await api(`/posts/${editingId}`, { method:'PATCH', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ title:$('title').value.trim(), slug:$('slug').value.trim(), content:$('content').value, status:'published' }) });
            toast('Post updated + published');
          } else {
            const created = await api('/posts', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ title:$('title').value.trim(), slug:$('slug').value.trim(), content:$('content').value }) });
            await api(`/posts/${created.id}`, { method:'PATCH', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ status:'published' }) });
            toast('Draft created + published');
          }
          resetForm();
          refreshPosts();
        } catch (e) { setMsg('editorMsg', `Publish failed: ${e.message}`, false); }
      };

      $('resetBtn').onclick = resetForm;

      async function toggleStatus(id, nextStatus){
        try { await api(`/posts/${id}`, { method:'PATCH', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ status: nextStatus }) }); toast(`Post #${id} -> ${nextStatus}`); refreshPosts(); }
        catch (e) { toast(e.message, false); }
      }

      async function deletePost(id){
        if (!confirm(`Delete post #${id}? This cannot be undone.`)) return;
        try { await api(`/posts/${id}`, { method:'DELETE' }); toast(`Post #${id} deleted`); if (editingId===id) resetForm(); refreshPosts(); }
        catch (e) { toast(e.message, false); }
      }

      function loadIntoForm(p){
        editingId = p.id;
        $('editorMode').textContent = `Mode: Editing #${p.id}`;
        $('saveBtn').textContent = 'Save Changes';
        $('title').value = p.title; $('slug').value = p.slug; $('content').value = p.content || '';
        if ($('preview').style.display !== 'none') refreshPreview();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }

      let postsIndex = {};

      async function refreshPosts(){
        const rows = $('rows');
        rows.innerHTML = '<tr><td colspan="6" class="muted">Loading…</td></tr>';
        if (!token()) { rows.innerHTML = '<tr><td colspan="6" class="muted">Login to view/manage all posts.</td></tr>'; return; }
        try {
          const q = encodeURIComponent($('q').value.trim());
          const status = encodeURIComponent($('statusFilter').value);
          const data = await api(`/posts/admin?skip=0&limit=100${status?`&status=${status}`:''}${q?`&q=${q}`:''}`);
          postsIndex = Object.fromEntries(data.map(p => [String(p.id), p]));
          if (!data.length) { rows.innerHTML = '<tr><td colspan="6" class="muted">No posts found.</td></tr>'; return; }
          rows.innerHTML = data.map(p => `
            <tr>
              <td>#${p.id}</td>
              <td>${escapeHtml(p.title)}</td>
              <td><code>${escapeHtml(p.slug)}</code></td>
              <td><span class="badge ${p.status==='published'?'b-pub':'b-draft'}">${p.status}</span></td>
              <td>${escapeHtml(dt(p.updated_at || p.created_at))}</td>
              <td>
                <div class="inline">
                  <button class="ghost" data-action="edit" data-id="${p.id}">Edit</button>
                  <button class="ghost" data-action="toggle" data-id="${p.id}" data-next="${p.status === 'published' ? 'draft' : 'published'}">${p.status === 'published' ? 'Unpublish' : 'Publish'}</button>
                  <button class="danger" data-action="delete" data-id="${p.id}">Delete</button>
                </div>
              </td>
            </tr>
          `).join('');
        } catch (e) {
          rows.innerHTML = `<tr><td colspan="6" class="err">${escapeHtml(e.message)}</td></tr>`;
        }
      }

      function escapeHtml(s){ return esc(s); }

      $('rows').addEventListener('click', (e) => {
        const btn = e.target.closest('button[data-action]');
        if (!btn) return;
        const id = btn.dataset.id;
        const action = btn.dataset.action;
        if (action === 'edit') return loadIntoForm(postsIndex[id]);
        if (action === 'toggle') return toggleStatus(Number(id), btn.dataset.next);
        if (action === 'delete') return deletePost(Number(id));
      });

      $('refreshBtn').onclick = refreshPosts;
      $('q').addEventListener('keydown', e => { if (e.key === 'Enter') refreshPosts(); });
      $('statusFilter').onchange = refreshPosts;
      refreshPosts();
    </script>
  </body>
</html>
