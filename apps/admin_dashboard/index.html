<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard · Blog Mission Control</title>
    <style>
      :root {
        --bg: #0b1020;
        --panel: #131a2e;
        --panel-2: #1a2340;
        --text: #e9eefc;
        --muted: #9fb0da;
        --ok: #33d17a;
        --err: #ff6b6b;
        --acc: #7c9cff;
        --line: #2a3760;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: radial-gradient(1200px 800px at 0% -10%, #1b2550 0%, var(--bg) 50%);
        color: var(--text);
        font-family: Inter, system-ui, Arial, sans-serif;
      }
      .wrap { max-width: 980px; margin: 28px auto; padding: 0 16px; }
      .top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
      .badge { color: var(--muted); font-size: 13px; }
      .card {
        background: linear-gradient(180deg, var(--panel), var(--panel-2));
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 16px;
        margin-bottom: 14px;
        box-shadow: 0 10px 30px rgba(0,0,0,.25);
      }
      h1, h3 { margin: 0 0 10px; }
      h1 { font-size: 30px; }
      h3 { font-size: 20px; }
      label { font-size: 12px; color: var(--muted); display:block; margin-top: 8px; }
      input, textarea, button {
        width: 100%;
        border-radius: 10px;
        border: 1px solid var(--line);
        background: #0f1730;
        color: var(--text);
        padding: 10px 12px;
        margin-top: 6px;
      }
      textarea { min-height: 150px; resize: vertical; }
      .inline { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
      .inline button { width: auto; cursor: pointer; }
      .primary { background: var(--acc); color: #0b1020; border: none; font-weight: 700; }
      .ghost { background: transparent; }
      .ok { color: var(--ok); }
      .err { color: var(--err); }
      .muted { color: var(--muted); font-size: 13px; }
      ul { padding-left: 18px; margin: 8px 0 0; }
      code { background:#0f1730; padding:2px 6px; border-radius:6px; }
      .grid { display:grid; grid-template-columns: 1fr; gap: 14px; }
      @media (min-width: 900px){ .grid { grid-template-columns: 1fr 1fr; } }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="top">
        <h1>Admin Dashboard</h1>
        <div class="badge">API: <code>https://api.stuff187.com</code></div>
      </div>

      <div class="grid">
        <section class="card">
          <h3>Login</h3>
          <label>Email</label>
          <input id="email" value="admin@stuff187.com" />
          <label>Password</label>
          <input id="password" type="password" placeholder="••••••••" />
          <div class="inline">
            <button id="loginBtn" class="primary">Login</button>
            <button id="whoBtn" class="ghost">Who am I</button>
            <button id="logoutBtn" class="ghost">Logout</button>
          </div>
          <div id="authMsg" class="muted"></div>
        </section>

        <section class="card">
          <h3>Publish Post</h3>
          <label>Post ID</label>
          <input id="postId" type="number" placeholder="e.g. 2" />
          <button id="publishBtn" class="primary">Publish</button>
          <div id="publishMsg" class="muted"></div>
        </section>
      </div>

      <section class="card">
        <h3>Create Draft Post</h3>
        <label>Title</label>
        <input id="title" placeholder="2nd Post" />
        <label>Slug (kebab-case)</label>
        <input id="slug" placeholder="second-post" />
        <label>Content</label>
        <textarea id="content" placeholder="Write your post..."></textarea>
        <button id="createBtn" class="primary">Create Draft</button>
        <div id="createMsg" class="muted"></div>
      </section>

      <section class="card">
        <div class="inline" style="justify-content:space-between; align-items:center;">
          <h3 style="margin:0;">Published Posts</h3>
          <button id="refreshBtn" class="ghost">Refresh</button>
        </div>
        <ul id="postList"></ul>
      </section>
    </div>

    <script>
      const API = "https://api.stuff187.com";
      const msg = (id, t, ok=true) => { const el=document.getElementById(id); el.textContent=t; el.className=ok?'ok':'err'; };
      const token = () => localStorage.getItem('admin_token') || '';
      const setToken = v => localStorage.setItem('admin_token', v);
      const clearToken = () => localStorage.removeItem('admin_token');
      const slugify = (s='') => s.toLowerCase().trim().replace(/[^a-z0-9\s-]/g,'').replace(/\s+/g,'-').replace(/-+/g,'-');
      const fmtErr = (d,s)=> typeof d?.detail==='string' ? d.detail : Array.isArray(d?.detail) ? d.detail.map(x=>x.msg).join('; ') : `HTTP ${s}`;

      document.getElementById('title').addEventListener('input', e=>{
        const s=document.getElementById('slug'); if(!s.value.trim()) s.value=slugify(e.target.value);
      });

      document.getElementById('loginBtn').onclick = async () => {
        try {
          const body = new URLSearchParams({ username: email.value.trim(), password: password.value });
          const res = await fetch(`${API}/auth/login`, { method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body });
          const data = await res.json(); if(!res.ok) throw new Error(fmtErr(data,res.status));
          setToken(data.access_token); msg('authMsg','Login success. Token saved.');
        } catch(e){ msg('authMsg',`Login failed: ${e.message}`,false); }
      };

      document.getElementById('whoBtn').onclick = async () => {
        if(!token()) return msg('authMsg','No token stored.',false);
        try {
          const res = await fetch(`${API}/auth/me`, { headers:{Authorization:`Bearer ${token()}`} });
          const data = await res.json(); if(!res.ok) throw new Error(fmtErr(data,res.status));
          msg('authMsg',`Logged in as ${data.email} (${data.role})`);
        } catch(e){ msg('authMsg',`Token check failed: ${e.message}`,false); }
      };

      document.getElementById('logoutBtn').onclick = () => { clearToken(); msg('authMsg','Logged out.'); };

      document.getElementById('createBtn').onclick = async () => {
        if(!token()) return msg('createMsg','Please login first.',false);
        const btn=createBtn; btn.disabled=true;
        try {
          const payload = { title:title.value.trim(), slug:slug.value.trim(), content:content.value };
          const res = await fetch(`${API}/posts`, { method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${token()}`}, body:JSON.stringify(payload) });
          const data = await res.json(); if(!res.ok) throw new Error(fmtErr(data,res.status));
          postId.value=data.id; msg('createMsg',`Draft created. Post ID: ${data.id}`); refreshPosts();
        } catch(e){ msg('createMsg',`Create failed: ${e.message}`,false); }
        finally { btn.disabled=false; }
      };

      document.getElementById('publishBtn').onclick = async () => {
        if(!token()) return msg('publishMsg','Please login first.',false);
        if(!postId.value) return msg('publishMsg','Enter post ID.',false);
        try {
          const res = await fetch(`${API}/posts/${postId.value}`, { method:'PATCH', headers:{'Content-Type':'application/json','Authorization':`Bearer ${token()}`}, body:JSON.stringify({status:'published'}) });
          const data = await res.json(); if(!res.ok) throw new Error(fmtErr(data,res.status));
          msg('publishMsg',`Published: ${data.slug}`); refreshPosts();
        } catch(e){ msg('publishMsg',`Publish failed: ${e.message}`,false); }
      };

      async function refreshPosts(){
        const el=postList; el.innerHTML='<li class="muted">Loading…</li>';
        try {
          const res=await fetch(`${API}/posts?skip=0&limit=20`); const data=await res.json(); if(!res.ok) throw new Error(fmtErr(data,res.status));
          el.innerHTML = data.length ? data.map(p=>`<li>#${p.id} — <strong>${p.title}</strong> (<code>${p.slug}</code>)</li>`).join('') : '<li class="muted">No posts.</li>';
        } catch(e){ el.innerHTML=`<li class="err">${e.message}</li>`; }
      }

      refreshPosts();
    </script>
  </body>
</html>
